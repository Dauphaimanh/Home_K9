<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer {
            width: auto;
            height: 400px   ;
            position: relative;
            background-size: contain;
            background-repeat: no-repeat;
            background-image: url(https://i.ytimg.com/vi/x0fSBAgBrOQ/maxresdefault.jpg);
        }
        .inner {
            width: 215px;
            height: 130px;
            opacity: 0.5;
            position: absolute;
            top: 25%;
            left: 22%;
            text-align: center;
            border-radius: 2px;
            background-color: #ddd;
        }
        .line {
            font-size: 7px;
            padding-top: -10px;
        }
        span {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <p>Blurred Background</p>
            <p class="line">By <span>F8 Fullstack</span></p>
        </div>
    </div>
</body>
</html>
