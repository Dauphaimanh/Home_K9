<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .song {
            width: 300px;
            margin: 30px auto;
            counter-reset: fone;
        }
        .songs h2 {
            display: list-item;
            counter-increment: fone;
        }

        .songs h2::before {
            content: "»" counter(fone);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            background: #008000;
            color: #fff;
            margin-right: 5px;
            border-radius: 50%;
        }

        .songs .child {
            margin-left: 25px;
            counter-reset: ftwo;
        }

        .songs .child h2 {
            counter-increment: ftwo;
        }
        .songs .child h2::before {
            content: counter(fone) "π" counter(ftwo);
        }
    </style>
</head>
<body>
    <div class="songs">
        <h2>bai 1</h2>
        <h2>bai 2
            <div class="child">
                <h2>bai 2.1</h2>
                <h2>bai 2.2</h2>
                <h2>bai 2.3</h2>
            </div>
        </h2>
        <h2>bai 3</h2>
        <h2>bai 4</h2>
    </div>
</body>
</html>
