<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#Around</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border: 2px solid salmon;
            position: relative;
        }
        .box span {
            width: 20px;
            height: 20px;
            display: block;
            position: absolute;
            background: #83ce27;
            border: 1px solid #fff;

            top: 0;
            left: 0;
            animation: move 3000ms linear infinite;
        }
        @keyframes move {
            25% {
                top: 0;
                left: 100%;
                translate: -100%;
            }
            50% {
                top: 100%;
                left: 100%;
                translate: -100% -100%;
            }
            75% {
                top: 100%;
                left: 0;
                translate: 0 -100%;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <span></span>
    </div>
</body>
</html>
