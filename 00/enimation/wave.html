<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#wave</title>
    <style>
        .wave {
            width: 100px;
            height: 100px;
            margin: 30px auto;
            display: flex;
            align-items: flex-end;
            gap: 5px;
        }

        .wave span {
            width: 15px;
            height: 30px;
            background: #FF0800;
            display: block;
            border-radius: 3px;

            animation: wave 1s ease-in-out infinite;
        }

        .wave span:nth-child(2) {
            animation-delay: 0.1s;
        }
        .wave span:nth-child(3) {
            animation-delay: 0.2s;
        }
        .wave span:nth-child(4) {
            animation-delay: 0.3s;
        }

        @keyframes wave {
            50% {
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</body>
</html>
