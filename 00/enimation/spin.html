<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#Spin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .spinner {
            width: 200px;
            height: 200px;
            position: relative;
        }

        .spinner::before, .spinner::after {
            content: "";
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            
            position: absolute;
            border: 10px solid #bdbdbd;
            border-radius: 50%;
        }

        .spinner::after {
            border-color: #DD571C transparent transparent transparent;
            animation: spin 666ms linear infinite;
        }

        @keyframes spin {
            100% {
                rotate: 360deg;
            }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
</body>
</html>
