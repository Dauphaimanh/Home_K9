<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } /* reset CSS */

        body {
            padding: 60px;
        }

        .form {
            gap: 20px;
            display: flex;
            flex-direction: column;
        }

        label::before {
            content: "";
            border: 2px solid #107cba;
            padding: 10px;
            display: inline-block;
            position: relative;
            cursor: pointer;
            margin-right: 10px;
        }

        label span {
            width: 20px;
            height: 20px;
            border: 2px solid #008000;
            margin-right: 5px;
        }

        label span::after {
            content: "";
            display: none;
            width: 10px;
            height: 10px;
            border: #008000 solid;
            border-width: 0 0 2px 2px;
            position: absolute;
            top: 6px;
            left: 4px;
            rotate: -45deg;
        }
        
    </style>
</head>
<body>
    <form action="#" class="form">
        <div class="gr">
            <input type="checkbox" id="html" hidden>
            <label for="html">HTML</label>
        </div>

        <div class="gr">
            <input type="checkbox" id="css" hidden>
            <label for="css">CSS</label>
        </div>

        <div class="gr">
            <input type="checkbox" id="js" hidden>
            <label for="js">Javascript</label>
        </div>
    </form>
</body>
</html>
