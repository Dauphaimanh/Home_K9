<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @font-face {
            font-family: "Lobster";
            src: url(./fonts/Lobster-Regular.ttf);
        }
        @font-face {
            font-family: "Lato";
            src: url(./fonts/Lato-Regular.ttf);
        }
        /* text */
        body {
            width: 500px;
            padding: 20px;
            font-family: "Lato", sans-serif;
        }
        h2 {
            font-family: "Lobster", sans-serif;
            font-size: 40px;
        }
        p span {
            color: #e3242b;
        }
        .under {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        button {
            width: 120px;
            height: 30px;
            background: #e3242b;
            color: #fff;
            border: none;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        input[type=email] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            margin-top: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div>
        <div>
            <h2>Hey There</h2>
            <p>
                <span>We'd like to hear from you. </span>
                Send us your message or just say hi with our contact form or directly via phone, we love to chat.
            </p>
        </div>
        <form>
            <!-- Name -->
            <div class="in-form">
                <input type="text" id="blacklist" placeholder="Your name">
            </div>
            <!-- Mail -->
            <div class="in-form">
                <input type="email" id="blacklist" placeholder="contact@fullstack.edu.vn">
            </div>
            <!-- Phone -->
            <div class="in-form">
                <input type="text" id="blacklist" placeholder="0246.329.1102">
            </div>
            <!-- Subject -->
            <div class="in-form">
                <select name="Subject" id="blacklist">
                    <option value="0">Subject</option>
                    <option value="1">Yên Hoà</option>
                </select>
            </div>
            <!-- Textarea -->
            <div class="in-form">
                <textarea name="message" id="message" cols="30" rows="10"></textarea>
            </div>
            <div class="under">
                <div>
                    <input type="checkbox" id="checkbox">
                    <label for="checkbox">Send me a copy of this message</label>
                </div>
                <button type="submit" class="button">S E N D</button>
            </div>
        </form>
</body>
</html>
