<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title># Menu ngang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: "Roboto", sans-serif;
            font-weight: 700;
            font-style: normal;
        }
        .contain {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header {
            margin-left: 20px;
            display: flex;
            align-items: center;
        }
        .header .icon {
            height: 15px;
            background: #808080;
            padding: 5px 8px 5px 8px;
            border-radius: 999px;
            display: flex;
            margin-left: 10px;
            justify-content: center;
            align-items: center;
            list-style: none;
        }
        p {
            font-size: 15px;
        }
        .icon {
            font-size: 10px;
            margin-right: 5px;
        }
        ul li {
            display: inline;
            list-style: none;
        }
        button {
            border: none;
            padding: 5px 20px 5px 20px;
            border-radius: 7px;
            color: #fff;
            font-size: 12px;
            background: linear-gradient(to right, #fce35e, #e5b1fb);
        }
    </style>
</head>
<body>
    <div class="contain">
        <div class="header">
            <div class="image">
                <img src="https://rainbowit.net/html/histudy/assets/images/logo/logo.png" alt="img" width="100px">
            </div>
            <div class="icon">
                <i class="fa-solid fa-bars icon"></i>
                <p>Option</p>
            </div>
        </div>
        <div class="list">
            <ul>
                <li><span>Home</span> <i class="fa-solid fa-chevron-down"></i></li>
                <li><span>Cources</span> <i class="fa-solid fa-chevron-down"></i></li>
                <li><span>Dashborad</span> <i class="fa-solid fa-chevron-down"></i></li>
                <li><span>Pages</span> <i class="fa-solid fa-chevron-down"></i></li>
                <li><span>Elements</span> <i class="fa-solid fa-chevron-down"></i></li>
                <li><span>Blog</span> <i class="fa-solid fa-chevron-down"></i></li>
            </ul>
        </div>
        <div class="button">
            <button type="submit">Join Now</button>
        </div>
    </div>
</body>
</html>
