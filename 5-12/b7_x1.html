<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <!-- Google font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            color: #666;
            box-sizing: border-box;
            font-family: "Open Sans", sans-serif;
        }
        /* reset css */

        nav {
            width: 85%;
            margin: 30px auto;
        }
        
        a {
            display: inline-block;
            padding: 4px 7px;
            text-decoration: none;
        }
        a:hover {
            color: #fff;
            background: #2da5da;
        }
        ul {
            list-style: none;
        }
        .main {
            background: #fff;
            display: inline-block;
            border: 1px solid #cfcfcf;
        }
        .main .item {
            padding: 3px;
            font-size: 1rem;
            position: relative;
            display: inline-block;
            border-right: 1px solid #cfcfcf;
        }

        /* Hidden content */
        .item:hover .hidden-content {
            display: block;
        }

        .hidden-content {
            top: 50%;
            left: 0;
            display: none;
            position: absolute;
            transform: scale(1,1);
        }

        .hidden-content .item {
            margin-top: 30px;
            width: 250px;
            border: none;
            background: #fff;
            box-shadow: 0 3px 10px rgb(0, 0, 0 / 0.2);
        }
        .hidden-content .item a {
            width: 100%;
            display: inline-block;
        }
        .hidden-content .item:first-child {
            position: relative;
        }
        
    </style>
</head>
<body>
    <nav>
        <ul class="main">
            <li class="item">
                <a href="#"><i class="fa-solid fa-toilet-paper"></i></a>
            </li>
            <li class="item">
                <a href="#">
                    <i class="fa-solid fa-star-half-stroke"></i> About us
                    <i class="fa-solid fa-caret-down"></i>
                </a>
                <ul class="hidden-content">
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Address</a></li>
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Email</a></li>
                </ul>
            </li>
            <li class="item">
                <a href="#">
                    <i class="fa-solid fa-volume-low"></i>  News
                    <i class="fa-solid fa-caret-down"></i>
                </a>
                <ul class="hidden-content">
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Company </a></li>
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Product </a></li>
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Special </a></li>
                </ul>
            </li>
            <li class="item">
                <a href="#">
                    <i class="fa-solid fa-briefcase"></i> Portfolio
                    <i class="fa-solid fa-caret-down"></i>
                </a>
                <ul class="hidden-content">
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Hoang An F8</a></li>
                    <li class="item"><a href="#"><i class="fa-solid fa-caret-right"></i> Son Dang F8</a></li>
                </ul>
            </li>
            <li class="item">
                <a href="#">
                    <i class="fa-regular fa-pen-to-square"></i> Blog
                </a>
            </li>
            <li class="item" id="">
                <a href="#">
                    <i class="fa-solid fa-phone-flip"></i> Contact
                </a>
            </li>
        </ul>
    </nav>
</body>
</html>
