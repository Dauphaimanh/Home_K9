<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./b7_x2.css" />
    <!-- Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <!-- Nunito -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Document</title>
  </head>
  <body>
      <div class="flex-container">
        <div class="container">
          <div class="form-left">
            <div class="overlay">
              <div class="overlay-left">
                <h1>Just Log</h1>
                <p class="para">
                  To keep connected with us please login with your personal info
                </p>
                <button class="btn-left">Read more</button>
                <div class="social-box">
                  <a href="#facebook" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                  <a href="#facebook" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                  <a href="#facebook" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                  <a href="#facebook" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
              </div>
            </div>
          </div>
          <div class="form-right">
            <form action="#">
              <h1 class="header-title">Login to<span> your account </span>
              </h1>
              <hr
                style="width: 20%;
                margin: 0 auto;
                border: solid #ff574d;
                border-width: 1px 1px 0;"
            >
              <input type="email" placeholder="Email" />
              <input type="password" placeholder="Password" />
              <div class="flex">
                <div class="flex-in">
                  <input type="checkbox" id="rememberMe" />
                  <label for="rememberMe">Remember</label>
                </div>
                <a href="#">Forgot password?</a>
              </div>
              <button class="btn-right">Login</button>
              <a href="#">Don't have an account? Register here</a>
            </form>
          </div>
        </div>
      </div>
  </body>
</html>
