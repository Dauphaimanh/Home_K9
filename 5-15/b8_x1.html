<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title># Banner dự án</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } /* reset CSS */
        body {
            font-family: "Asap", sans-serif;
            background-repeat: no-repeat;
            background-image: url(https://cdn.houseviet.vn/images/project/23042023/ha-noi-melody-residences-cover.jpg);
        }

        .center-box {
            position: absolute;
            padding: 20px;
            margin: 150px auto;
            margin-left: 100px;
            background-color: #ffffffbf;
        }

        .content-box {
            color: #3f3424;
        }

        .header {
            color: #bf4240;
            padding-bottom: 10px;
        }

        .location {
            font-size: 15px;
            padding-top: 12px;
        }

        .price-box {
            top: 40px;
            left: 75%;
            width: 100px;
            padding: 10px;
            color: #fff;
            font-weight: bold;
            text-align: center;
            border: none;
            border-radius: 2px;
            position: relative;
            background: #dd5e56;
        }
    </style>
</head>
<body>
    <div class="center-box">
        <div class="content-box">
            <h2 class="header">Ha Noi Melody Residences</h2>
            <p>
                Dự án Ha Noi Melody Residences toạ lạc ngay trung tâm Khu đô thị mới Linh Đàm.
            </p>
            <p>
                Dự án có quy mô 3.28ha, dự kiến cung ứng ra thị trường 1.857 căn hộ cao cấp
            </p>
            <p class="location">
                <i class="fa-solid fa-location-dot"></i> Quận Hoàng Mai, Hà Nội 
            </p>
        </div>
        <div class="price-box">
            3.2 Tỷ/Căn
        </div>
    </div>
</body>
</html>
