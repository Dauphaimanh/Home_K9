<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title># Profile chủ đầu tư</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Asap", sans-serif;
        } /* reset CSS */

        .container {
            width: 100%;
            height: 600px;
            background-size: cover;
            background-image: url(https://ircdn.vingroup.net/storage/public/2019/07/DJI_0030-fixed2-mini-20190727T100030844048.jpg);
        }
        .container .box {
            width: auto;
            height: 100px;
            top: 500px;
            left: 90px;
            display: flex;
            position: absolute;
        }
        img {
            padding: 25px 25px 0 25px;
            margin-right: 30px;
            background-color: #fff;
        }
        .info {
            color: #fff;
            font-size: 10px;
        }
        h2 {
            font-size: 20px;
            padding: 20px 0 30px 0;
        }
        .p-box p {
            display: inline;
            span {
                font-weight: bold;
            }
        }

        .content {
            float: right;
            padding: 50px 150px 50px 50px;
            list-style: none;
        }
        ul li {
            padding: 0 10px;
            font-size: 15px;
            display: inline-block;
            position: relative;
        }
        ul li a {
            color: #28231d;
            text-decoration: none;
        }
        ul li a:hover {
            color: #e6655e;
            padding-bottom: 5px;
            border-bottom: 4px solid #e6655e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="https://upload.wikimedia.org/wikipedia/vi/thumb/9/98/Vingroup_logo.svg/1200px-Vingroup_logo.svg.png" alt="#">
            <div class="info">
                <h2>Tập đoàn vingroup</h2>
                <div class="p-box">
                    <p>Năm thành lập : <span>1993</span></p>
                    <p>Dự án đã đầu tư : <span>35</span></p>
                </div>
            </div>
        </div>
    </div>
    <ul class="content">
        <li><a href="#">Giới Thiệu</a></li>
        <li><a href="#">Dự Án Đã Đầu Tư</a></li>
        <li><a href="#">Liên Hệ</a></li>
    </ul>
</body>
</html>
