<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom List</title>
    <style>
        ul li:nth-child(1) {
        list-style: "🦍  ";
        }
        ul li:nth-child(2) {
        list-style: "🦬  ";
        }
        ul li:nth-child(3) {
        list-style: "🦣  ";
        }
        ul li:nth-child(4) {
        list-style: "🦀  ";
        }
    </style>
</head>
<body>
    <div>
        <ul class="emoji">
            <li>MUTO Prime</li>
            <li>Methuselah</li>
            <li>Behemoth</li>
            <li>Scylla</li>
        </ul>
    </div>
</body>
</html>
