<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .head {
            margin: 30px auto;
            padding: 10px;
            border: 2px inset salmon;
        }

        .btn {
            width: 150px;
            height: 40px;
            border: none;
            display: block;
            color: #fff;
            background: #239923;
            margin: 30px auto;
            border-radius: 99px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            span {
                font-size: 1.3em;
                position: relative;
            }
        }
        .btn::before {
            content: "";
            inset: 0 100% 0 0;
            position: absolute;
            background: #DD571C;
            transition-delay: 0.6s;
            transition: right 4.6s cubic-bezier(.68,.52,0,.99);
        }
        .btn:hover::before {
            right: 0;
        }
        /* line split */
        .switch {
            width: 100px;
            height: 40px;
            display: block;
            margin: 30px auto;
            border-radius: 99px;
            background: #989595;
            position: relative;
            overflow: hidden;
            .button {
                width: 38px;
                height: 38px;
                display: block;
                top: 1px;
                right: 1px;
                cursor: pointer;
                position: absolute;
                background: #fff;
                border-radius: 50%;
                transition: right 2.8s ease;
                z-index: 1;
            }
        }
        .bg {
            position: absolute;
            inset: 0;
            transition: right 2.8s ease;
        }
        .switch input:checked + .button {
            right: calc(100% - 39px);
        }
        .switch input:checked ~ .bg {
            background: #DD571C;
        }
    </style>
</head>
<body>
    <div class="head">
        <p>Known to some ancient civilizations as the "Fire Demon"</p>
    </div>
    <button class="btn">
        <span>Click me</span>
    </button>
    <hr>
    <label class="switch">
        <input type="checkbox" hidden>
        <div class="button"></div>
        <span class="bg"></span>
    </label>
</body>
</html>
