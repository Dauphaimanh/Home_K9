<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title># Bài 2</title>
    <link rel="stylesheet" href="./v10.3.css">
</head>
<body>
    <div class="ctn">
        <div class="taisho">
            <div class="showa">
                <h3>Drop Us a Line</h3>
                <p>Reach out to us from your contact form and we will get back to you shortly</p>
            </div>
            <div class="heisei">
                <form action="#">
                   <div class="reiwa">
                        <div class="content">
                            <input class="fl-input" type="text" name="name" id="name">
                            <label class="fl-label" for="name">First Name *</label>
                        </div>

                        <div class="content">
                            <input class="fl-input" type="text" name="l-name" id="l-name">
                            <label class="fl-label" for="l-name">Last Name *</label>
                        </div>
                   </div>

                    <div class="reiwa">
                        <div class="content">
                            <input class="fl-input" type="email" name="email" id="email">
                            <label class="fl-label" for="email">Email *</label>
                        </div>

                        <div class="content">
                            <select name="select" id="select">
                                <option value="0">- Option -</option>
                                <option value="1">Hanoi</option>
                                <option value="2">Hue</option>
                                <option value="3">Danang</option>
                            </select>
                        </div>
                    </div>

                    <div class="content">
                        <textarea name="message" id="message" cols="30" rows="10"></textarea>
                        <label class="fl-label" for="message"></label>
                    </div>
                </form>
                <button>Send message</button>
            </div>
        </div>
    </div>
</body>
</html>
