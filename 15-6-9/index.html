<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website UI</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- get font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <!-- favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png">
    <link rel="manifest" href="./favicon/site.webmanifest">
</head>
<body>
    <div class="wrap">
        <div class="iner">
            <aside class="sidebar">
                <a href="" class="sider-img">
                    <img src="./icons/logo.svg" alt="">
                </a>

                <h2>Explore</h2>

                <nav class="nav">
                    <a href="" class="sider-n">
                        <img src="./icons/x1.svg" alt="" class="sider-img">New In
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x2.svg" alt="" class="sider-img">Clothing
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x3.svg" alt="" class="sider-img">Shoes
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x4.svg" alt="" class="sider-img">Accessories
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x5.svg" alt="" class="sider-img">Activewear
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x6.svg" alt="" class="sider-img">Gift & Living
                    </a>
                    <a href="" class="sider-n">
                        <img src="./icons/x7.svg" alt="" class="sider-img">Inspiration
                    </a>
                </nav>

                <button class="button">
                    <span class="icon">
                        <img src="./icons/what is that.svg" alt="">
                    </span>
                    Help Center
                </button>
            </aside>

            <header class="header">
                <form action="" class="search">
                    <img src="./icons/search label.svg" alt="" class="icon">
                    <input type="text" class="searching" placeholder="Search Store">
                </form>

                <nav class="nav">
                    <a href="" class="link active">products</a>
                    <a href="" class="link">story</a>
                    <a href="" class="link">manufacturing</a>
                    <a href="" class="link">packaging</a>
                </nav>

                <div class="actions">
                    <a href="" class="act-link">
                        <img src="./icons/cart.svg" alt="" class="act-icon">
                    </a>
                    <a href="" class="act-link">
                        <img src="./icons/persional.svg" alt="" class="act-icon">
                    </a>
                </div>
            </header>

            <main class="main">
                <div class="short"><img src="./image/12thg4.jpeg" alt=""></div>
                <div class="tall"><img src="./image/v10.jpeg" alt=""></div>
                <div class="short"><img src="./image/23thg4.jpeg" alt=""></div>
                <div class="tall"><img src="./image/v10.jpeg" alt=""></div>
                <div class="tall"><img src="./image/v11.jpeg" alt=""></div>
                <div class="tall"><img src="./image/v12.jpeg" alt=""></div>
                <div class="short"><img src="./image/darkness soul.jpeg" alt=""></div>
                <div class="short"><img src="./image/Uji Hojicha Latte Azuki.jpeg" alt=""></div>
            </main>
        </div>
    </div>

</html>
