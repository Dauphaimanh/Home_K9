<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 3 - bài 2</title>
    <style>
        table, td {
            border: 2px solid #1B1212;
            text-align: center;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td {
            padding: 50px;
        }
        .white {
            text-align: right;
        }
        .blue {
            background-color: #a0bff2;
        }
    </style>
</head>
<body>
    <table>
        <tr id="white">
            <td colspan="4" id="nine" style="text-align: right;">9 + 9</td>
        </tr>
        <tr class="blue">
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>+</td>
        </tr>
        <tr class="blue">
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>-</td>
        </tr>
        <tr class="blue">
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td>x</td>
        </tr>
        <tr class="blue">
            <td>C</td>
            <td>0</td>
            <td>=</td>
            <td>/</td>
        </tr>
    </table>
</body>
</html>
