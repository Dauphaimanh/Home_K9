<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 3 - bài 3</title>
</head>
<body>
    <form>
        <div>
            <!-- input tag should have 'required' value to get validate before submit -->
            <label>Username :
                <input 
                    type="text"
                    name="username">
            </label>
        </div>
        <div>
            <label>Password :
                <input 
                    type="password"
                    name="password">
            </label>
        </div>
        <div>
            <label>City of Employment :
                <input 
                    type="text" 
                    name="city">
            </label>
        </div>
        <div>
            <label>Web server :
                <select name="select" id="select">
                    <option value="choose">-- Choose a server --</option>
                    <option value="hanoi">Ha Noi</option>
                    <option value="hue">Hue</option>
                    <option value="danang">Da Nang</option>
                    <option value="hcm">Ho Chi Minh</option>
                </select>
            </label>
        </div>
        <div>
            <label>Please specify your role :</label>
            <div>
                <label>
                    <input 
                        type="radio"
                        name="role"
                        value="0">
                        Admin
                </label>
                <label>
                    <input 
                        type="radio"
                        name="role"
                        value="1">
                        Engineer
                </label>
                <label>
                    <input 
                        type="radio"
                        name="role"
                        value="3">
                        Manager
                </label>
                <label>
                    <input 
                        type="radio"
                        name="role"
                        value="4">
                        Guest
                </label>
            </div>
        </div>
        <div>
            <label for="">Payment method :</label>
            <div>
                <label>
                    <input 
                        type="checkbox"
                        name="payment"
                        value="credit">
                        Credit Card
                </label>
                <label>
                    <input 
                        type="checkbox"
                        name="payment"
                        value="momo">
                        Momo
                </label>
                <label>
                    <input 
                        type="checkbox"
                        name="payment"
                        value="qrcode">
                        QR Code
                </label>
            </div>
        </div>
        <div>
            <button type="submit">Login</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</body>
</html>
