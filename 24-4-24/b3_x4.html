<body>
    <form>
        <!-- 
            the form tag don't need to combine the 
            heading (h3) 
                input tag should have 'required' value 
                to get validate before submit 
        -->
        <h3>Get in touch us by filling contact form below</h3>
        <div>
            <input type="text" name="fullname" placeholder="*Enter your full name">
            <input type="text" name="fullname" placeholder="*Enter your full name">
        </div>
        <div>
            <input type="text" name="fullname" placeholder="*Enter your full name">
        </div>
        <div>
            <label for="message"></label>
            <textarea 
                name="message" 
                id="message" 
                cols="60" 
                rows="10"
                placeholder="*Your message here">
            </textarea>
        </div>
        <div>
            <button type="submit">Send message</button><p>*Please fill all require form filed, thanks !</p>
            <!-- 
                the 'please fill all..' line should in the same 
                line with the button tag 
            -->
        </div>
    </form>
