<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 3 - Bài 1</title>
    <style>
        .header {
            width: 50%;
            background-color: #ECF0F1;
        }
        .split {
            width: 15%;
            float: left;
        }
    </style>
</head>
<body>
    <header class="header"></header>
        <section>
            <h3>Try a free sample</h3>
            <p>Sign up to get a coupon you can redeem at your nearest
                Dancing Goat cafe for a sample of the Columbia Carlos
                Imbachi coffee.We'll also make sure you don't miss out
                on news introducing the new coffees that we add to our
                store regularly.
            </p>
        </section>
        <main>
            <form action="">
                <div class="split">
                    <div><label for="fname">First name</label></div>
                    <!-- input tag should have 'required' value to get validate before submit -->
                    <input 
                        type="text"
                        name="fname"
                        id="fname"
                        placeholder="Vu">
                    <div><label for="email">Mail address</label></div>
                    <input 
                        type="email"
                        name="email"
                        id="email"
                        placeholder="contact@fullstack.edu.vn">
                    <div><label for="city">City</label></div>
                    <input 
                        type="text"
                        name="city"
                        id="city"
                        placeholder="Hà Nội">
                    <div><label for="zip-code">ZIP code</label></div>
                    <input 
                        type="text"
                        name="zip-code"
                        id="zip-code"
                        placeholder="122100">
                </div>
                <div>
                    <div><label for="lname">Last name</label></div>
                    <input 
                        type="text"
                        name="lname"
                        id="lname"
                        placeholder="Manh">
                    <div><label for="address">Address</label></div>
                    <input 
                        type="text"
                        name="address"
                        id="address"
                        placeholder="Số 11D, khu đô thị Nam Trung Kiên, Yên Hoà, Cầu Giấy">
                    <div>
                        <label for="lname">State 
                            <span style="color: #B2BEB5;">(optional)</span>
                        </label>
                    </div>
                    <input 
                        type="text"
                        name="state"
                        id="state"
                        placeholder="..>¿">
                    <div><label for="country">Country</label></div>
                    <select name="country" id="country">
                        <option value="0">Vietnam</option>
                        <option value="1">France</option>
                        <option value="2">Germany</option>
                        <option value="3">Italy</option>
                        <option value="4">Spain</option>
                        <option value="5">Turkey</option>
                        <option value="6">Austria</option>
                        <option value="7">China</option>
                        <option value="8">Mexico</option>
                        <option value="9">Thailand</option>
                        <option value="10">Canada</option>
                        <option value="11">Japan</option>
                        <option value="12">Poland</option>
                        <option value="13">Malaysia</option>
                        <option value="14">United Kingdom</option>
                        <option value="15">united State</option>
                    </select>
                </div>
            </form>
            <button type="submit" id="button">
                Send me free coffee
            </button>
        </main>
    </table> <!-- WTF bro -->
</body>
</html>
