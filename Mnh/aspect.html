<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><div id="Aspect"></div></title>
    <style>
        .box {
            width: 300px;
            aspect-ratio: 16 / 9; /* chia đều */
            margin: 10% auto;
            border-radius: 3px;

            background-image: linear-gradient(
                to right,
                #ffff00,
                #f8ea47,
                #f0d465,
                #f0d465,
                #e7bf7c,
                #ddaa8f,
                #d095a1,
                #c280b2,
                #b26cc2,
                #9d56d2,
                #8440e1,
                #6028f0,
                #0000ff
            );
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
